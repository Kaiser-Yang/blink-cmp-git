name: formatter

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  stylua:
    name: Format Lua Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --verify -g '*.lua' -- .

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "format: stylua"
